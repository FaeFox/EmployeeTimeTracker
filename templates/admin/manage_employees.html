{% extends 'base_template.html' %}
{% block title %}Manage Employees{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/socketClient.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='js/manageEmployees.js') }}"></script>
{% endblock %}

{% block content %}
<h1 class="mt-5 pb-3">Manage Employees</h1>

<input type="hidden" id="username" value="{{ session['username'] }}" />

<div class="card row">
  <div class="card-body">
    <div class="d-flex flex-wrap align-items-end">

      <!-- Add Employee -->
      <div class="d-flex flex-column me-3 mb-3">
        <label class="form-label">New Employee Name</label>
        <input type="text" id="newEmployeeName" class="form-control mt-2" placeholder="Enter name">
      </div>


      <div class="d-flex flex-column me-3 mb-3">
        <label class="form-label">Group</label>
        <select id="newEmployeeRole" class="form-select mt-2">
          <option value="user" selected>User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="d-flex flex-column mb-3">
        <button type="button" id="addEmployeeBtn" class="btn btn-success mt-4">
          Add Employee
        </button>
      </div>

    </div>
  </div>
</div>

<div class="card row p-4">
  <div class="col-lg-12">
    <table id="employee_table" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>Name</th>
          <th>ID</th>
          <th>Group</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

{% endblock %}
