<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Starting...</title>

    <style>
        /* ===== Bootstrap-like minimal styling (local, no CDN) ===== */

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: #121212;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .card {
            width: 450px;
            background: #1e1e1e;
            border-radius: 0.5rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.6);
            color: #f8f9fa;
        }

        .card-body {
            padding: 1.5rem;
            text-align: center;
        }

        .mb-4 { margin-bottom: 1.5rem; }
        .mb-3 { margin-bottom: 1rem; }

        h3 {
            margin: 0;
            font-weight: 500;
        }

        .progress {
            height: 1.5rem;
            background-color: #2c2c2c;
            border-radius: 0.375rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d6efd;
            color: white;
            font-size: 0.875rem;
            transition: width 0.4s ease;
        }

        .progress-bar-striped {
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,.15) 50%,
                rgba(255,255,255,.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 1rem 1rem;
        }

        .progress-bar-animated {
            animation: progress-bar-stripes 1s linear infinite;
        }

        @keyframes progress-bar-stripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
        }

        #statusText {
            white-space: pre-line;
            color: #f8f9fa;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-body">
            <h3 class="mb-4" id="titleBar">Loading Application</h3>

            <div class="progress mb-3">
                <div id="progressBar"
                     class="progress-bar progress-bar-striped progress-bar-animated">
                    0%
                </div>
            </div>

            <div id="statusText">Starting...</div>
        </div>
    </div>

    <script>
        var previous_text = "";

        function updateProgress(percent, message) {
            const bar = document.getElementById("progressBar");
            const text = document.getElementById("statusText");
            const title = document.getElementById("titleBar");
            const progressContainer = document.getElementsByClassName("progress")[0];

            if (message.toLowerCase().includes("error")) {
                progressContainer.style.display = 'none';
                text.innerText = previous_text + " failed.\n" + message;
                text.style.color = '#ff6b6b';
                title.innerText = 'Failed to start application';
                title.style.color = '#ff6b6b';
                return;
            }

            if (previous_text !== "") {
                previous_text = previous_text + " done.\n" + message;
            } else {
                previous_text = message;
            }

            progressContainer.style.display = 'block';
            text.style.color = '#f8f9fa';

            bar.style.width = percent + "%";
            bar.innerText = percent + "%";
            text.innerText = previous_text;
        }
    </script>
</body>

</html>
